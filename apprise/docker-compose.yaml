services:
  apprise:
    container_name: apprise
    hostname: apprise
    image: caronc/apprise:1.3.3
    restart: unless-stopped
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+$'
      - wud.trigger.exclude=docker.autoupdate
    environment:
      APPRISE_STATEFUL_MODE: simple
      APPRISE_WORKER_COUNT: 1
      APPRISE_ADMIN: yes
    ports:
      - 8000:8000
    volumes:
      - ${DOCKER_VOLUME_ROOT}/apprise/config:/config
      - ${DOCKER_VOLUME_ROOT}/apprise/plugin:/plugin
      - ${DOCKER_VOLUME_ROOT}/apprise/attach:/attach
    networks:
      - apprise

networks:
  apprise:
    name: apprise-network
    external: true
